# Icecat Integration Configuration
# Copy this file to config.yaml and fill in your values

database:
  driver: mysql+pymysql
  host: localhost
  port: 3306
  database: icecat_integration
  username: root
  password: ""
  pool_size: 20
  max_overflow: 10
  # Enable for cloud databases or any TLS-required server
  ssl: false

icecat:
  # FrontOffice credentials (for Live API access)
  front_office_username: "your_username"
  front_office_password: "your_password"
  front_office_api_key: "your_api_key"

  # FTP/SFTP credentials (for data file downloads)
  ftp_host: "sftp.icecat.biz"
  ftp_protocol: "sftp"       # "ftp" or "sftp"
  ftp_port: 22               # 0 = auto (21 for FTP, 22 for SFTP)
  ftp_username: "your_ftp_username"
  ftp_password: "your_ftp_password"
  ftp_timeout: 30

sync:
  batch_size: 100
  # API request timeout in seconds (5 min covers large product responses)
  request_timeout: 300
  concurrency: 40

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: logs/icecat_integration.log
  max_file_size: 10485760  # 10 MB
  backup_count: 5
